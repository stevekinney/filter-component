output:
  - failure
  - execution_out

pre-commit:
  piped: true
  skip:
    - merge
    - rebase
  jobs:
    - name: format-staged
      run: bun run prettier --write {staged_files}
      glob: '**/*.{ts,tsx,js,jsx,json,md,css,yml,html}'
      stage_fixed: true
    - name: lint-fix
      run: bun run oxlint --fix --deny-warnings {staged_files}
      glob: '**/*.{ts,tsx,js,jsx}'
      stage_fixed: true
    - name: check-conditional-braces
      run: bun run check:conditional-braces
      glob: '**/*.{ts,tsx,js,jsx}'
    - name: lint-css-fix
      run: bun run stylelint --fix {staged_files}
      glob: 'src/**/*.css'
      stage_fixed: true
    - name: test
      run: bun run test
    - name: test-e2e
      run: bun run test:e2e
